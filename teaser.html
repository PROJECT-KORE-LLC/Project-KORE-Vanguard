<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SYNC // PROJECT KORE</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#050505">
    <meta name="apple-mobile-web-app-capable" content="yes">

    <style>
        :root { --gold: #d4af37; --noir: #050505; }

        body { 
            margin: 0; background: var(--noir); height: 100vh; overflow: hidden; 
            display: flex; align-items: center; justify-content: center; 
            font-family: 'Georgia', serif; cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        
        /* 8K CHIAROSCURO ANCHOR (85mm BLUR START) */
        .bg-anchor { 
            position: fixed; width: 100%; height: 100%; 
            background: url('atrium_8k.webp') center/cover no-repeat; 
            opacity: 0; filter: blur(30px) brightness(0.5); 
            transition: 4s cubic-bezier(0.4, 0, 0.2, 1); 
            z-index: 1;
        }
        .bg-anchor.active { opacity: 0.35; filter: blur(0px) brightness(0.8); }

        /* THE 6HZ NEURAL ANCHOR (SUBTLE PULSE) */
        .pulse { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: var(--gold); opacity: 0; 
            animation: neuralSync 0.166s infinite alternate; 
            z-index: 1000; pointer-events: none; 
        }
        @keyframes neuralSync { from { opacity: 0; } to { opacity: 0.03; } }

        /* THE SOVEREIGN TEXT BLOCK */
        .sync-container {
            text-align: center; z-index: 1010; opacity: 0; 
            transform: translateY(15px); transition: 2s ease-out;
        }
        .sync-container.active { opacity: 1; transform: translateY(0); }

        .status-dot { 
            width: 8px; height: 8px; background: var(--gold); 
            border-radius: 50%; display: inline-block; margin-right: 15px; 
            box-shadow: 0 0 15px var(--gold); animation: glow 2s infinite;
        }
        @keyframes glow { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        .sync-text { 
            color: var(--gold); letter-spacing: 12px; 
            text-transform: uppercase; font-size: 0.85rem;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
        }

        .prompt-text {
            position: fixed; bottom: 40px; width: 100%; text-align: center;
            color: var(--gold); font-size: 0.6rem; letter-spacing: 4px;
            text-transform: uppercase; opacity: 0.4; transition: 1s;
        }
    </style>
</head>
<body onclick="initiateSync()">

    <div class="pulse"></div>
    <div id="bg" class="bg-anchor"></div>
    
    <main id="sync-ui" class="sync-container">
        <div class="sync-text">
            <span class="status-dot"></span>PROJECT KORE // SOVEREIGN SYNC
        </div>
    </main>

    <div id="prompt" class="prompt-text">[ TAP TO INITIATE HANDSHAKE ]</div>

    <script>
        function initiateSync() {
            // 1. SET THE SESSION KEY (Unlocks the Guild Hall)
            sessionStorage.setItem('KORE_Synced', 'true');

            // 2. VISUAL ACTIVATION
            document.getElementById('bg').classList.add('active');
            document.getElementById('sync-ui').classList.add('active');
            document.getElementById('prompt').style.opacity = "0";
            
            // 3. AUDIO RESONANCE (The Waves hit)
            const waves = new Audio('waves.mp3'); 
            waves.volume = 0.5;
            waves.play().catch(e => console.log("Audio requires manual tap sync."));

            // 4. THE LETHAL FLASH TIMING (7.5 Seconds)
            setTimeout(() => {
                // Fade out to black before transition
                document.body.style.transition = "1s";
                document.body.style.opacity = "0";
                
                setTimeout(() => {
                    window.location.href = 'guild.html';
                }, 1000);
            }, 7500); 
        }

        // Forensic Log
        console.log("KORE // Sovereign Sync Staged. Awaiting Identity Verification.");
    </script>
</body>
</html>
