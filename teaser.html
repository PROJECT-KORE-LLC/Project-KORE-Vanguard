<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SYNC // PROJECT KORE</title>
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#050505">

    <style>
        :root { --gold: #d4af37; --noir: #050505; }
        body { 
            margin: 0; background: var(--noir); height: 100vh; overflow: hidden; 
            display: flex; align-items: center; justify-content: center; 
            font-family: 'Georgia', serif; cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        
        /* 8K ATRIUM BLUR (No "letters" or messy text) */
        .bg-anchor { 
            position: fixed; width: 100%; height: 100%; 
            background: url('atrium_8k.webp') center/cover no-repeat; 
            opacity: 0; filter: blur(20px) brightness(0.4); 
            transition: 3s ease-in-out; z-index: 1;
        }
        .bg-anchor.active { opacity: 0.3; filter: blur(5px) brightness(0.7); }

        .pulse { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: var(--gold); opacity: 0; 
            animation: neuralSync 0.166s infinite alternate; 
            z-index: 1000; pointer-events: none; 
        }
        @keyframes neuralSync { from { opacity: 0; } to { opacity: 0.02; } }

        .sync-container {
            text-align: center; z-index: 1010; opacity: 0.6; 
            transition: 1s;
        }

        .sync-text { 
            color: var(--gold); letter-spacing: 8px; 
            text-transform: uppercase; font-size: 0.75rem;
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
        }
    </style>
</head>
<body onclick="initiateSync()">

    <div class="pulse"></div>
    <div id="bg" class="bg-anchor"></div>
    
    <main id="sync-ui" class="sync-container">
        <div class="sync-text" id="status-text">[ INITIALIZING HANDSHAKE ]</div>
    </main>

    <script>
        function initiateSync() {
            // Set the Key instantly
            localStorage.setItem('KORE_Identity_Locked', 'true');
            
            document.getElementById('bg').classList.add('active');
            document.getElementById('status-text').innerText = "IDENTITY LOCKED";
            document.getElementById('status-text').style.letterSpacing = "12px";

            // Instant Warp (Zero fluff)
            setTimeout(() => {
                document.body.style.transition = "0.8s";
                document.body.style.opacity = "0";
                setTimeout(() => { window.location.href = 'guild.html'; }, 800);
            }, 1200);
        }

        // Silent Shield Registration
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(() => {});
        }
    </script>
</body>
</html>
