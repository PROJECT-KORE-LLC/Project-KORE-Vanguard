<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SYNC // PROJECT KORE</title>
    <style>
        :root { --gold: #d4af37; --noir: #050505; }
        body { 
            margin: 0; background: var(--noir); height: 100vh; overflow: hidden; 
            display: flex; align-items: center; justify-content: center; 
            font-family: 'Georgia', serif; cursor: pointer;
        }
        
        /* 8K ANCHOR WITH 85mm BLUR */
        .bg-anchor { 
            position: fixed; width: 100%; height: 100%; 
            background: url('atrium_8k.webp') center/cover; 
            opacity: 0; filter: blur(30px); 
            transition: 4s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .bg-anchor.active { opacity: 0.35; filter: blur(0px); }

        /* THE 6HZ NEURAL SYNC */
        .pulse { 
            position: fixed; width: 100%; height: 100%; background: var(--gold); 
            opacity: 0; animation: p 0.166s infinite alternate; 
            z-index: 1000; pointer-events: none; 
        }
        @keyframes p { from { opacity: 0; } to { opacity: 0.03; } }

        /* THE BRAND LOCK */
        .sync-text { 
            color: var(--gold); text-align: center; z-index: 1010; 
            opacity: 0; transform: translateY(15px); transition: 2s; 
            letter-spacing: 12px; text-transform: uppercase; font-size: 0.9rem;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
        }
        .sync-text.active { opacity: 1; transform: translateY(0); }
        
        .status-dot { width: 6px; height: 6px; background: var(--gold); border-radius: 50%; display: inline-block; margin-right: 15px; box-shadow: 0 0 10px var(--gold); }
    </style>
</head>
<body onclick="initiateSync()">

    <div class="pulse"></div>
    <div id="bg" class="bg-anchor"></div>
    
    <div id="text" class="sync-text">
        <span class="status-dot"></span>PROJECT KORE // SOVEREIGN SYNC
    </div>

    <script>
        function initiateSync() {
            // Visual Handshake
            document.getElementById('bg').classList.add('active');
            setTimeout(() => { document.getElementById('text').classList.add('active'); }, 800);
            
            // Audio Frequency (The Waves hit)
            const audio = new Audio('waves.mp3'); 
            audio.volume = 0.5;
            audio.play();

            // Automatic Hard-Redirect to Atrium
            setTimeout(() => {
                window.location.href = 'guild.html';
            }, 7500); 
        }
        console.log("KORE // Awaiting Somatic Trigger.");
    </script>
</body>
</html>
