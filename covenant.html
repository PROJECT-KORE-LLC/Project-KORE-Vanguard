<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PROJECT KORE // COVENANT COMMAND // HARDENED 9.4</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        *, *::before, *::after { box-sizing: border-box; }

        :root {
            --primary: #D4AF37; 
            --primary-glow: rgba(212, 175, 55, 0.4);
            --hijack-glow: rgba(229, 149, 0, 0.6);
            --glass: rgba(6, 6, 8, 0.98);
            --unison-tempo: 8s;
            --unison-ease: cubic-bezier(0.4, 0, 0.2, 1);
        }

        .noir-mode { --primary: #D4AF37; --hijack-glow: rgba(229, 149, 0, 0.6); }
        .lunar-mode { --primary: #A5F2F3; --hijack-glow: rgba(0, 80, 150, 0.5); }
        .vellum-mode { --primary: #C2B280; --hijack-glow: rgba(101, 67, 33, 0.5); }
        .amethyst-mode { --primary: #9966CC; --hijack-glow: rgba(75, 0, 130, 0.5); }

        body, html {
            margin: 0; padding: 0; background: #000;
            overflow-x: hidden;
            font-family: 'Times New Roman', serif;
            height: 100%; width: 100%; color: #F4EBD0;
            -webkit-font-smoothing: antialiased;
        }

        /* --- THE HEARTH & SOMATIC PULSE --- */
        #bg-anchor {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #020204 url('logistics_8k.webp') no-repeat center center;
            background-size: cover; z-index: 1;
            animation: flatlineBreath var(--unison-tempo) infinite alternate var(--unison-ease);
            will-change: transform; transform: translateZ(0);
            pointer-events: none;
        }

        #glow-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, transparent 15%, var(--hijack-glow) 100%);
            z-index: 5; pointer-events: none;
            animation: flatlineGlow var(--unison-tempo) infinite alternate var(--unison-ease);
            will-change: opacity; opacity: 0.15;
        }

        @keyframes flatlineBreath { 0% { transform: scale(1.1) translateZ(0); } 100% { transform: scale(1.16) translateZ(0); } }
        @keyframes flatlineGlow { 0% { opacity: 0.15; } 100% { opacity: 0.75; } }

        /* --- THE SOMATIC GATE --- */
        #handshake-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 2000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            backdrop-filter: blur(40px); transition: opacity 1s;
        }

        .handshake-input-wrap {
            border-bottom: 2px solid var(--primary);
            padding: 10px; width: 85%; max-width: 280px; text-align: center;
        }
        .handshake-input-wrap input {
            background: transparent; border: none; color: var(--primary);
            text-align: center; font-size: 2rem; letter-spacing: 10px;
            outline: none; width: 100%; font-family: monospace;
            -webkit-text-security: disc;
        }
        .gate-label {
            font-size: 0.55rem; letter-spacing: 6px; color: var(--primary);
            opacity: 0.4; margin-bottom: 20px; text-transform: uppercase;
            text-align: center;
        }

        /* --- COMMAND VIEWPORT --- */
        #ui-viewport {
            position: relative; z-index: 100;
            height: 100vh; width: 100vw;
            display: none; justify-content: center; align-items: center;
            padding: 10px;
        }
        #ui-viewport.active { display: flex; opacity: 1; }
        #ui-viewport.cloaked { display: none !important; pointer-events: none !important; }

        .command-tank {
            width: 100%; max-width: 1400px; height: 96vh;
            background: var(--glass); border: 2px solid var(--primary);
            padding: 15px; display: flex; flex-direction: column; gap: 10px;
            box-shadow: 0 0 100px #000, inset 0 0 20px var(--primary-glow);
            backdrop-filter: blur(15px); overflow: hidden; contain: strict;
        }

        .tank-header { border-bottom: 1px solid rgba(212,175,55,0.2); padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .matrix-nav { display: flex; align-items: center; gap: 10px; }
        .matrix-nav h2 { margin: 0; letter-spacing: 4px; text-transform: uppercase; font-size: 0.9rem; color: var(--primary); }
        .nav-arrow { background: none; border: 1px solid var(--primary); color: var(--primary); cursor: pointer; padding: 4px 10px; font-size: 0.7rem; }

        .core-grid { display: grid; grid-template-columns: minmax(0, 310px) 1fr minmax(0, 310px); gap: 15px; flex: 1; min-height: 0; width: 100%; }
        .array-column { display: flex; flex-direction: column; gap: 15px; min-height: 0; }

        .sector { border: 1px solid rgba(212, 175, 55, 0.2); padding: 12px; display: flex; flex-direction: column; background: rgba(255, 255, 255, 0.01); min-height: 0; flex: 1; overflow: hidden; }
        .sector h3 { margin: 0 0 8px 0; font-size: 0.6rem; letter-spacing: 3px; text-transform: uppercase; color: var(--primary); border-bottom: 1px solid rgba(212, 175, 55, 0.1); white-space: nowrap; }

        .feed-box { flex: 1; overflow-y: auto; scrollbar-width: none; min-height: 0; }
        .entry { margin-bottom: 8px; font-size: 0.8rem; border-left: 2px solid var(--primary); padding-left: 10px; line-height: 1.4; color: rgba(244, 235, 208, 0.9); word-wrap: break-word; }

        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; flex: 1; width: 100%; }
        .cal-day { background: rgba(255,255,255,0.01); border: 1px solid rgba(212, 175, 55, 0.05); display: flex; justify-content: center; align-items: center; font-size: 0.6rem; color: rgba(212, 175, 55, 0.3); cursor: pointer; position: relative; min-height: 30px; }
        .cal-day.active-node { border-color: var(--primary); background: rgba(212, 175, 55, 0.1); color: #fff; }

        .tank-footer { border-top: 1px solid rgba(212, 175, 55, 0.3); padding-top: 10px; display: flex; flex-direction: column; gap: 10px; }
        .dispatch-cluster { display: flex; gap: 10px; align-items: stretch; width: 100%; }
        .target-selector { display: flex; flex-direction: column; gap: 4px; width: 100px; flex-shrink: 0; }
        .target-btn { background: rgba(0,0,0,0.5); border: 1px solid rgba(212, 175, 55, 0.2); color: var(--primary); font-size: 0.45rem; padding: 4px; cursor: pointer; letter-spacing: 1px; text-transform: uppercase; }
        .target-btn.active { border-color: var(--primary); background: var(--primary-glow); }
        .command-input { flex: 1; background: rgba(0,0,0,0.2); border: none; border-left: 2px solid var(--primary); color: var(--primary); padding: 8px; font-family: monospace; outline: none; resize: none; font-size: 0.85rem; }
        .exec-btn { width: 70px; background: #000; border: 1px solid #fff; color: #fff; text-transform: uppercase; letter-spacing: 1px; font-size: 0.6rem; cursor: pointer; }

        .jolt-bar { display: flex; gap: 5px; justify-content: center; width: 100%; }
        .lux-btn { background: rgba(0,0,0,0.6); border: 1px solid var(--primary); color: var(--primary); padding: 8px 12px; cursor: pointer; font-size: 0.5rem; text-transform: uppercase; letter-spacing: 2px; white-space: nowrap; flex: 1; max-width: 100px; text-align: center; }

        @media (max-width: 1000px) {
            .core-grid { grid-template-columns: 1fr; overflow-y: auto; scrollbar-width: none; }
            .sector { min-height: 200px; }
            .dispatch-cluster { flex-direction: row; flex-wrap: wrap; }
            .target-selector { width: 100%; flex-direction: row; }
            .target-btn { flex: 1; }
            .command-input { width: 100%; margin: 5px 0; }
            .exec-btn { width: 100%; padding: 12px; }
            .jolt-bar { flex-wrap: wrap; }
            .lux-btn { flex-basis: 45%; max-width: none; }
        }
    </style>
</head>
<body id="master-body" onclick="ghostRestore()">

    <audio id="cricket-atmosphere" src="crickets.mp3" loop></audio>

    <div id="handshake-overlay">
        <div class="gate-label">Initialize Sovereign Handshake</div>
        <div class="handshake-input-wrap">
            <input type="text" id="passphrase-input" maxlength="6" autofocus autocomplete="off" spellcheck="false" placeholder="******">
        </div>
        <div style="margin-top:40px; font-size:0.5rem; opacity:0.3; letter-spacing:4px;">PROMPT: A1B2C3</div>
    </div>

    <div id="bg-anchor"></div>
    <div id="glow-layer"></div>

    <div id="ui-viewport">
        <div class="command-tank" onclick="event.stopPropagation()">
            <header class="tank-header">
                <div class="matrix-nav">
                    <button class="nav-arrow" onclick="changeMonth(-1)"><</button>
                    <h2 id="matrix-month">Matrix</h2>
                    <button class="nav-arrow" onclick="changeMonth(1)">></button>
                </div>
                <button onclick="toggleCloak(event)" style="background:none; border:1px solid var(--primary); color:var(--primary); font-size:0.5rem; padding:4px 10px; cursor:pointer;">CLOAK</button>
            </header>

            <div class="core-grid">
                <div class="array-column">
                    <section class="sector"><h3>Directives</h3><div class="feed-box" id="directives-feed"></div></section>
                    <section class="sector"><h3>Temporal</h3><div class="feed-box" id="temporal-feed"></div></section>
                </div>
                <main class="sector"><h3>Matrix</h3><div class="calendar-grid" id="calendar-matrix"></div></main>
                <div class="array-column">
                    <section class="sector"><h3>Important</h3><div class="feed-box" id="important-feed"></div></section>
                    <section class="sector"><h3>Notes</h3><div class="feed-box" id="notes-feed"></div></section>
                </div>
            </div>

            <footer class="tank-footer">
                <div class="dispatch-cluster">
                    <div class="target-selector">
                        <button class="target-btn active" id="btn-task" onclick="setTarget('TASK', this)">DIR</button>
                        <button class="target-btn" id="btn-appt" onclick="setTarget('APPT', this)">TEMP</button>
                        <button class="target-btn" id="btn-imp" onclick="setTarget('IMPORTANT', this)">IMP</button>
                        <button class="target-btn" id="btn-note" onclick="setTarget('NOTE', this)">NOTE</button>
                    </div>
                    <textarea class="command-input" id="command-editor" placeholder="DISPATCH..."></textarea>
                    <button class="exec-btn" onclick="executeCommand()">EXEC</button>
                </div>
                <div class="jolt-bar">
                    <button class="lux-btn" onclick="jolt('noir')">Noir</button>
                    <button class="lux-btn" onclick="jolt('lunar')">Lunar</button>
                    <button class="lux-btn" onclick="jolt('vellum')">Vellum</button>
                    <button class="lux-btn" onclick="jolt('amethyst')">Amethyst</button>
                </div>
            </footer>
        </div>
    </div>

    <script>
        // --- 1. DIRECT HANDSHAKE (PRIORITY 1) ---
        const TEST_KEY = "A1B2C3";
        const gateInput = document.getElementById('passphrase-input');

        function tryUnlock(value) {
            if (value.trim().toUpperCase() === TEST_KEY) {
                // BRUTE FORCE REVEAL
                document.getElementById('handshake-overlay').style.display = 'none';
                document.getElementById('ui-viewport').style.display = 'flex';
                document.getElementById('ui-viewport').classList.add('active');
                
                // LAZY LOAD DATA
                inhaleVeil();
                try { document.getElementById('cricket-atmosphere').play(); } catch(e){}
            }
        }
        gateInput.addEventListener('input', (e) => tryUnlock(e.target.value));
        gateInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') tryUnlock(gateInput.value); });

        // --- 2. DB SHIELD ---
        let supabaseClient = null;
        try {
            const SUPABASE_URL = 'https://oqwljgnlhaghnrtkvvkz.supabase.co'; 
            const SUPABASE_KEY = 'oqwljgnlhaghnrtkvvkz';
            if (typeof supabase !== 'undefined') {
                supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            }
        } catch (e) { console.warn("Supabase Shielded."); }

        // --- 3. SYSTEM LOGIC ---
        let currentTarget = "TASK", activeDate = null, matrixState = {}, viewDate = new Date();

        function toggleCloak(e) { if(e) e.stopPropagation(); document.getElementById('ui-viewport').classList.add('cloaked'); }
        function ghostRestore() { const ui = document.getElementById('ui-viewport'); if (ui.classList.contains('cloaked')) { ui.classList.remove('cloaked'); } }
        function jolt(p) { const b = document.getElementById('master-body'); b.className = ''; b.classList.add(`${p}-mode`); }
        function setTarget(t, btn) { currentTarget = t; document.querySelectorAll('.target-btn').forEach(x => x.classList.remove('active')); btn.classList.add('active'); }

        async function inhaleVeil() {
            const raw = localStorage.getItem('KORE_V1');
            if (raw) { try { matrixState = JSON.parse(atob(raw)); } catch(e) { matrixState = {}; } }
            initMatrix();
            if (supabaseClient) {
                const { data, error } = await supabaseClient.from('matrix_ledger').select('*');
                if (!error && data) {
                    data.forEach(row => {
                        const d = row.node_date;
                        if (!matrixState[d]) matrixState[d] = { TASK:[], APPT:[], IMPORTANT:[], NOTE:[] };
                        if (!matrixState[d][row.category].includes(row.content)) matrixState[d][row.category].push(row.content);
                    });
                    initMatrix();
                }
            }
        }

        function initMatrix() {
            const grid = document.getElementById('calendar-matrix');
            const y = viewDate.getFullYear(), m = viewDate.getMonth();
            document.getElementById('matrix-month').innerText = `${viewDate.toLocaleString('default', {month:'long'})} ${y}`;
            grid.innerHTML = '';
            const total = new Date(y, m+1, 0).getDate();
            for(let i=1; i<=total; i++) {
                const dStr = `${y}-${String(m+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
                const d = document.createElement('div'); d.className = 'cal-day';
                if(dStr === activeDate) d.classList.add('active-node');
                d.innerHTML = `<span>${i}</span>`;
                d.onclick = () => { activeDate = dStr; refresh(); initMatrix(); };
                grid.appendChild(d);
            }
        }

        function refresh() {
            const d = matrixState[activeDate] || { TASK:[], APPT:[], IMPORTANT:[], NOTE:[] };
            const f = { TASK:'directives-feed', APPT:'temporal-feed', IMPORTANT:'important-feed', NOTE:'notes-feed' };
            Object.keys(f).forEach(k => {
                const el = document.getElementById(f[k]); 
                if(el) {
                    el.innerHTML = '';
                    if(d[k]) d[k].forEach(t => { const div = document.createElement('div'); div.className='entry'; div.innerHTML=t; el.appendChild(div); });
                }
            });
        }

        async function executeCommand() {
            const input = document.getElementById('command-editor');
            const val = input.value.trim();
            if(!activeDate || !val) return;
            if(!matrixState[activeDate]) matrixState[activeDate] = { TASK:[], APPT:[], IMPORTANT:[], NOTE:[] };
            matrixState[activeDate][currentTarget].push(val);
            localStorage.setItem('KORE_V1', btoa(JSON.stringify(matrixState)));
            input.value = ''; refresh(); initMatrix();
            if(supabaseClient) await supabaseClient.from('matrix_ledger').insert([{ node_date: activeDate, category: currentTarget, content: val }]);
        }

        function changeMonth(n) { viewDate.setMonth(viewDate.getMonth() + n); initMatrix(); }
    </script>
</body>
</html>
