<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE COVENANT // SOVEREIGN LOG</title>

    <script>
        if (!localStorage.getItem('KORE_Identity_Locked')) {
            window.location.href = 'teaser.html';
        }
    </script>

    <style>
        :root { 
            --gold: #d4af37; 
            --noir: #050505; 
            --glass: rgba(15, 15, 15, 0.7); 
        }

        body {
            margin: 0; background: var(--noir) url('atrium_8k.webp') center/cover no-repeat;
            font-family: 'Georgia', serif; color: #fdfbf7;
            height: 100vh; overflow: hidden;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        /* --- SOMATIC LAYERS (The Soul) --- */
        .neural-anchor { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: var(--gold); opacity: 0; pointer-events: none; z-index: 1;
            animation: slowBreathe 8s infinite ease-in-out; 
        }
        @keyframes slowBreathe { 0%, 100% { opacity: 0.01; } 50% { opacity: 0.05; } }
        
        .breathing-filigree { 
            position: fixed; bottom: -10%; right: -10%; width: 70%; height: 70%; 
            background: radial-gradient(circle at bottom right, var(--gold), transparent 70%); 
            filter: blur(80px); pointer-events: none; z-index: 2; 
            animation: somaticBreath 19s infinite ease-in-out; 
        }
        @keyframes somaticBreath { 0%, 100% { opacity: 0.1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(1.1); } }

        /* --- THE GLASS LEDGER --- */
        .covenant-vault {
            width: 85%; max-width: 600px; height: 70vh;
            background: var(--glass); backdrop-filter: blur(25px);
            border: 1px solid rgba(212, 175, 55, 0.3);
            padding: 40px; box-shadow: 0 30px 100px rgba(0,0,0,1);
            display: flex; flex-direction: column; z-index: 10;
            position: relative;
        }

        h1 {
            color: var(--gold); letter-spacing: 10px; text-transform: uppercase;
            font-size: 0.8rem; text-align: center; margin-bottom: 30px;
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
        }

        #log-display {
            flex-grow: 1; overflow-y: auto; margin-bottom: 25px;
            padding-right: 15px;
        }

        /* Custom Scrollbar for the Void */
        #log-display::-webkit-scrollbar { width: 2px; }
        #log-display::-webkit-scrollbar-thumb { background: var(--gold); }

        .log-entry {
            margin-bottom: 25px; border-left: 1px solid var(--gold);
            padding-left: 15px; animation: entryFade 1s ease-out;
        }
        @keyframes entryFade { from { opacity: 0; transform: translateX(-5px); } to { opacity: 1; transform: translateX(0); } }

        .log-date {
            font-size: 0.55rem; color: var(--gold); letter-spacing: 3px;
            text-transform: uppercase; margin-bottom: 8px; opacity: 0.5;
        }

        .log-text { font-size: 1.05rem; line-height: 1.7; color: #e0e0e0; }

        /* --- THE INPUT FIELD --- */
        .forge-area { display: flex; flex-direction: column; gap: 15px; }

        #log-input {
            background: rgba(0,0,0,0.4); border: 1px solid rgba(212, 175, 55, 0.2);
            color: #fff; padding: 20px; font-family: 'Georgia', serif;
            resize: none; outline: none; height: 60px; font-size: 1.1rem;
            transition: 0.5s;
        }
        #log-input:focus { border-color: var(--gold); background: rgba(0,0,0,0.6); }

        .forge-btn {
            background: none; border: 1px solid var(--gold); color: var(--gold);
            padding: 12px; cursor: pointer; text-transform: uppercase;
            letter-spacing: 5px; font-size: 0.65rem; transition: 0.5s;
        }
        .forge-btn:hover { background: var(--gold); color: var(--noir); box-shadow: 0 0 20px rgba(212, 175, 55, 0.4); }

        .back-link {
            position: fixed; bottom: 30px; z-index: 100;
            text-decoration: none; color: var(--gold); font-size: 0.65rem;
            letter-spacing: 5px; text-transform: uppercase; opacity: 0.3;
            transition: 0.8s;
        }
        .back-link:hover { opacity: 1; letter-spacing: 8px; }
    </style>
</head>
<body>

    <div class="neural-anchor"></div>
    <div class="breathing-filigree"></div>

    <div class="covenant-vault">
        <h1>Family Covenant Log</h1>
        
        <div id="log-display">
            </div>

        <div class="forge-area">
            <textarea id="log-input" placeholder="Forge a new record..."></textarea>
            <button class="forge-btn" onclick="addEntry()">Commit to Ledger</button>
        </div>
    </div>

    <a href="guild.html" class="back-link">← RETURN TO ATRIUM</a>

    <script>
        const display = document.getElementById('log-display');
        const input = document.getElementById('log-input');

        function loadLogs() {
            const logs = JSON.parse(localStorage.getItem('KORE_Family_Logs') || '[]');
            display.innerHTML = logs.map(entry => `
                <div class="log-entry">
                    <div class="log-date">${entry.date}</div>
                    <div class="log-text">${entry.text}</div>
                </div>
            `).join('');
            display.scrollTop = display.scrollHeight;
        }

        function addEntry() {
            if (!input.value.trim()) return;
            
            const logs = JSON.parse(localStorage.getItem('KORE_Family_Logs') || '[]');
            const newEntry = {
                date: new Date().toLocaleString([], { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }).toUpperCase(),
                text: input.value.trim()
            };
            
            logs.push(newEntry);
            localStorage.setItem('KORE_Family_Logs', JSON.stringify(logs));
            input.value = '';
            loadLogs();
        }

        window.onload = loadLogs;
    </script>
</body>
</html>
