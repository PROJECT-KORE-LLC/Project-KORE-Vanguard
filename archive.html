
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PROJECT KORE // THE ARCHIVE [GHOST_TAP]</title>
    <style>
        :root {
            --gold: #D4AF37;
            --gold-glow: rgba(212, 175, 55, 0.3);
            --pax-amber: rgba(229, 149, 0, 0.4);
            --glass-base: rgba(8, 8, 10, 0.9);
            --tempo: 4s; 
        }

        body, html {
            margin: 0; padding: 0;
            background: #020204;
            overflow: hidden;
            font-family: 'Times New Roman', serif;
            height: 100%; width: 100%;
            color: #F4EBD0;
        }

        /* --- THE HEARTH (Layer 1 - BACKGROUND) --- */
        #bg-anchor {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: url('gallery_8k.webp') no-repeat center center;
            background-size: cover;
            z-index: 1;
            transform: scale(1.15);
            animation: imageBreathe var(--tempo) infinite alternate ease-in-out;
            will-change: transform;
            cursor: default;
        }

        @keyframes imageBreathe { 
            0% { transform: scale(1.15); } 100% { transform: scale(1.2); } 
        }

        /* --- SOMATIC HIJACK (Layer 2 - THE GLOW) --- */
        #glow-layer {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--pax-amber);
            z-index: 5;
            pointer-events: none;
            opacity: 0.1;
            animation: somaticBreathe var(--tempo) infinite alternate ease-in-out;
            will-change: opacity;
            backdrop-filter: sepia(5%) brightness(0.98) blur(12px); 
            -webkit-backdrop-filter: sepia(5%) brightness(0.98) blur(12px);
        }

        @keyframes somaticBreathe { 
            0% { opacity: 0.1; } 100% { opacity: 0.45; } 
        }

        /* --- THE UI VIEWPORT --- */
        #ui-viewport {
            position: relative;
            z-index: 100;
            height: 100vh; width: 100%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            padding: 40px; box-sizing: border-box;
            transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1), filter 1.0s ease;
        }

        /* --- GHOST MODE STATE --- */
        .cloaked {
            opacity: 0 !important;
            pointer-events: none !important;
        }

        /* --- THE LUXURY VAULT --- */
        .archive-vault {
            width: 100%; max-width: 1000px;
            background: var(--glass-base);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(212, 175, 55, 0.4);
            padding: 50px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.9), inset 0 0 25px var(--gold-glow);
            display: flex; flex-direction: column; gap: 30px;
        }

        .vault-header h2 {
            margin: 0; font-size: 1.8rem; letter-spacing: 12px;
            text-transform: uppercase; color: var(--gold);
            text-shadow: 0 0 15px var(--gold-glow);
        }

        .annals-body {
            height: 250px; overflow-y: auto;
            font-family: 'Georgia', serif; line-height: 2.0;
            padding-right: 25px; font-size: 1.05rem;
            color: rgba(244, 235, 208, 0.85);
            border-bottom: 1px solid rgba(212, 175, 55, 0.15);
        }

        /* --- THE COMMAND ARRAY --- */
        .command-array {
            margin-top: 50px;
            display: flex; gap: 20px;
            flex-wrap: wrap; justify-content: center;
        }

        .lux-btn {
            background: rgba(8, 8, 10, 0.9);
            border: 1px solid rgba(212, 175, 55, 0.6);
            color: var(--gold);
            padding: 12px 28px; cursor: pointer;
            font-size: 0.75rem; text-transform: uppercase; letter-spacing: 4px;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .lux-btn:hover { background: var(--gold); color: #000; }

        /* THE GHOST TRIGGER */
        #cloak-btn {
            position: fixed;
            top: 30px; right: 30px;
            z-index: 2000;
            background: rgba(0,0,0,0.4); border: 1px solid rgba(212, 175, 55, 0.2);
            color: var(--gold); padding: 12px 20px;
            cursor: pointer; font-size: 0.65rem; letter-spacing: 3px;
            text-transform: uppercase;
            transition: all 0.4s;
            backdrop-filter: blur(5px);
        }
        #cloak-btn:hover { border-color: var(--gold); background: rgba(0,0,0,0.8); }

        /* PALETTE ALIGNMENTS */
        .noir { filter: contrast(1.1) brightness(0.9) sepia(0.1); }
        .lunar { filter: contrast(0.9) brightness(1.15) hue-rotate(180deg) saturate(0.5); }
        .vellum { filter: sepia(0.45) brightness(1.0) contrast(1.05); }
        .amethyst { filter: hue-rotate(270deg) brightness(0.9) saturate(1.1); }

    </style>
</head>
<body onclick="ghostRestore(event)">

    <button id="cloak-btn" onclick="toggleCloak(event)">Cloak Ledger</button>

    <div id="bg-anchor"></div>
    <div id="glow-layer"></div>

    <div id="ui-viewport" class="viewport-main vellum">
        
        <div class="archive-vault">
            <div class="vault-header">
                <h2>The Archive</h2>
                <span style="font-size: 0.7rem; letter-spacing: 4px; opacity: 0.5;">SOVEREIGN SOMATIC MEMORY</span>
            </div>
            
            <div class="annals-body">
                <p><em>> Awaiting the Architect's Lore...</em></p>
            </div>

            <textarea style="background:rgba(0,0,0,0.2); border:none; border-left: 2px solid var(--gold); color:var(--gold); padding:15px; outline:none; resize:none; font-family:monospace;" rows="2" placeholder="RECORD THE LORE..."></textarea>
        </div>

        <div class="command-array">
            <button class="lux-btn" onclick="jolt('noir')">Noir Filigree</button>
            <button class="lux-btn" onclick="jolt('lunar')">Lunar Glass</button>
            <button class="lux-btn" onclick="jolt('vellum')">Sovereign Vellum</button>
            <button class="lux-btn" onclick="jolt('amethyst')">Amethyst Bronze</button>
            <button class="lux-btn" onclick="toggleEngine()" id="engine-btn" style="border-color: #fff; color: #fff;">Initialize Engine</button>
        </div>

    </div>

    <audio id="wind-audio" src="winterwind.mp3" loop></audio>

    <script>
        let active = false;
        let pulse;
        const wind = document.getElementById('wind-audio');

        /**
         * THE GHOST RESTORE
         * If the viewport is cloaked, clicking ANYWHERE restores it.
         */
        function ghostRestore(e) {
            const viewport = document.getElementById('ui-viewport');
            const btn = document.getElementById('cloak-btn');
            
            if (viewport.classList.contains('cloaked')) {
                viewport.classList.remove('cloaked');
                btn.innerText = "Cloak Ledger";
                if (navigator.vibrate) navigator.vibrate(30);
                console.log("📂 Ledger Restored via Ghost Handshake.");
            }
        }

        function toggleCloak(e) {
            // StopPropagation ensures the ghostRestore doesn't trigger immediately
            e.stopPropagation();
            const viewport = document.getElementById('ui-viewport');
            const btn = document.getElementById('cloak-btn');
            
            if (viewport.classList.contains('cloaked')) {
                viewport.classList.remove('cloaked');
                btn.innerText = "Cloak Ledger";
            } else {
                viewport.classList.add('cloaked');
                btn.innerText = "Uncloak";
                if (navigator.vibrate) navigator.vibrate(40);
                console.log("👻 Ghost Mode Active. Tap screen to restore.");
            }
        }

       function jolt(p) {
    const viewport = document.getElementById('ui-viewport');
    // Remove old palette classes but keep 'cloaked' if it's there
    viewport.classList.remove('noir', 'lunar', 'vellum', 'amethyst');
    viewport.classList.add(p);
    
    if (navigator.vibrate) navigator.vibrate([30, 40]);
}

        function toggleEngine() {
            const btn = document.getElementById('engine-btn');
            if (!active) {
                active = true;
                btn.innerText = "Engine Active";
                wind.volume = 0.4;
                wind.play();
                startSync();
            } else {
                active = false;
                btn.innerText = "Initialize Engine";
                wind.pause();
                clearInterval(pulse);
            }
        }

        function startSync() {
            const heartbeat = () => {
                if (navigator.vibrate && active) {
                    navigator.vibrate([40, 60, 40]);
                }
            };
            heartbeat(); 
            pulse = setInterval(heartbeat, 4000); 
        }
    </script>
</body>
</html>
