<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE HEARTH // PROJECT KORE</title>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="audio-engine.js"></script>
    
    <script>
        if (performance.navigation.type === 1 || window.performance.getEntriesByType("navigation")[0].type === "reload") {
            window.location.href = "guild.html"; 
        }
    </script>
    
    <style>
        [x-cloak] { display: none !important; }

        :root {
            --bg: #050505; --accent: #d4af37; --text: #e0e0e0; --glass: rgba(15, 15, 15, 0.95);
        }
        [data-palette="LUNAR"] {
            --bg: #0a0c10; --accent: #a8c0ff; --text: #ffffff; --glass: rgba(10, 12, 16, 0.95);
        }
        [data-palette="VELLUM"] {
            --bg: #0f0d0b; --accent: #c4a484; --text: #d2b48c; --glass: rgba(35, 25, 20, 0.98);
        }
        [data-palette="AMETHYST"] {
            --bg: #0d0510; --accent: #cd7f32; --text: #9b59b6; --glass: rgba(30, 10, 40, 0.95);
        }

        body {
            margin: 0; height: 100vh; overflow: hidden;
            font-family: 'Georgia', serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex; flex-direction: column;
            transition: 0.8s;
        }

        .pulse-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--accent); opacity: 0; pointer-events: none; z-index: 999;
            animation: somatic 0.166s infinite alternate;
        }
        @keyframes somatic { from { opacity: 0; } to { opacity: 0.02; } }

        .nav-header {
            position: absolute; top: 0; left: 0; width: 100%;
            padding: 30px 40px; display: flex; justify-content: space-between; align-items: center;
            z-index: 100; box-sizing: border-box;
        }

        .back-link { 
            color: var(--accent); text-decoration: none; font-size: 0.7rem; 
            letter-spacing: 3px; opacity: 0.6; transition: 0.4s;
            text-transform: uppercase;
        }
        .back-link:hover { opacity: 1; text-shadow: 0 0 15px var(--accent); }

        .artifact-btn {
            background: var(--glass); backdrop-filter: blur(10px);
            border: 1px solid var(--accent); color: var(--accent);
            padding: 10px 25px; border-radius: 2px; cursor: pointer;
            font-size: 0.65rem; letter-spacing: 2px; transition: 0.4s;
            text-transform: uppercase;
        }
        .artifact-btn:hover { background: var(--accent); color: var(--bg); }

        #interface {
            height: 100vh; display: flex; align-items: center; justify-content: center;
            padding: 40px; box-sizing: border-box;
        }

        .ledger-vault {
            border: 1px solid var(--accent); padding: 50px;
            background: var(--glass); width: 100%; max-width: 850px;
            box-shadow: 0 30px 100px rgba(0,0,0,1); position: relative;
            backdrop-filter: blur(25px);
        }

        h1 { color: var(--accent); letter-spacing: 10px; text-transform: uppercase; margin: 0; font-size: 2rem; }

        .grid-container {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 25px; margin-top: 40px;
        }

        .grid-item {
            border: 1px solid rgba(212, 175, 55, 0.2); padding: 20px;
            background: rgba(255,255,255,0.02); transition: 0.3s;
        }
        .grid-item:hover { border-color: var(--accent); background: rgba(255,255,255,0.05); }

        .item-label { font-size: 0.6rem; color: var(--accent); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; opacity: 0.7; }
        .item-value { font-size: 1.1rem; letter-spacing: 1px; color: #fff; }

        .forensic-footer { position: absolute; bottom: 10px; width: 100%; text-align: center; font-size: 0.6rem; letter-spacing: 2px; opacity: 0.3; pointer-events: none; }
    </style>
</head>
<body x-data="hearthApp()">

    <div class="pulse-layer"></div>

    <nav class="nav-header">
        <a href="guild.html" class="back-link">◂ THE GUILD HALL</a>
        <div style="display:flex; gap:15px; align-items:center;">
            <button class="artifact-btn" onclick="toggleAlignment()">✨ ALIGNMENT</button>
            <button class="artifact-btn" onclick="window.location.href='resonance.html'">RESONANCE</button>
        </div>
    </nav>

    <main id="interface">
        <section class="ledger-vault">
            <h1>🔥 THE HEARTH</h1>
            <p style="font-size: 0.7rem; letter-spacing: 3px; opacity: 0.6; margin-top: 10px;">[ RESOURCE LOGISTICS // UTILITY HUB // 0826-AUDIT ]</p>
            
            <div class="grid-container">
                <div class="grid-item">
                    <div class="item-label">Grid Status</div>
                    <div class="item-value">OPERATIONAL</div>
                </div>
                <div class="grid-item">
                    <div class="item-label">Supply Chain</div>
                    <div class="item-value">VERIFIED</div>
                </div>
                <div class="grid-item">
                    <div class="item-label">Asset Liquidity</div>
                    <div class="item-value">STABLE</div>
                </div>
                <div class="grid-item">
                    <div class="item-label">Inbound Traffic</div>
                    <div class="item-value">SECURE</div>
                </div>
            </div>

            <div style="margin-top: 40px; border-top: 1px solid rgba(212, 175, 55, 0.1); padding-top: 30px;">
                <button class="artifact-btn" style="width: 100%;">ACCESS FULL LOGISTICS LEDGER</button>
            </div>
        </section>
    </main>

    <div class="forensic-footer">
        PROJECT KORE // THE HEARTH // ID: 53858700 // GNU GPL V3
    </div>

    <script>
        const palettes = ['NOIR', 'LUNAR', 'VELLUM', 'AMETHYST'];
        function toggleAlignment() {
            let current = localStorage.getItem('KORE_Palette') || 'NOIR';
            let next = palettes[(palettes.indexOf(current) + 1) % palettes.length];
            document.documentElement.setAttribute('data-palette', next);
            localStorage.setItem('KORE_Palette', next);
        }
        document.addEventListener('DOMContentLoaded', () => {
            document.documentElement.setAttribute('data-palette', localStorage.getItem('KORE_Palette') || 'NOIR');
        });

        document.addEventListener('alpine:init', () => {
            Alpine.data('hearthApp', () => ({
                init() { console.log("Universal Logistics Hub Synced."); }
            }))
        })
    </script>
</body>
</html>
