<!DOCTYPE html>
<html lang="en" data-palette="NOIR">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE GUILD HALL // PROJECT KORE</title>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="audio-engine.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        :root { --bg: #050505; --accent: #d4af37; --text: #e0e0e0; --glass: rgba(15, 15, 15, 0.9); }
        [data-palette="LUNAR"] { --bg: #0a0c10; --accent: #a8c0ff; --text: #ffffff; }
        [data-palette="VELLUM"] { --bg: #0f0d0b; --accent: #c4a484; --text: #d2b48c; }
        [data-palette="AMETHYST"] { --bg: #0d0510; --accent: #cd7f32; --text: #9b59b6; }

        body { margin: 0; height: 100vh; overflow: hidden; font-family: 'Georgia', serif; background: var(--bg) url('atrium_8k.webp') center/cover no-repeat; color: var(--text); transition: 0.8s; transform: translateZ(0); }
        
        .neural-anchor { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--accent); opacity: 0; pointer-events: none; z-index: 9999; animation: brainReset 0.166s infinite alternate; }
        @keyframes brainReset { from { opacity: 0; } to { opacity: 0.02; } }
        .breathing-filigree { position: fixed; bottom: -10%; right: -10%; width: 70%; height: 70%; background: radial-gradient(circle at bottom right, var(--accent), transparent 70%); filter: blur(60px); pointer-events: none; z-index: 1; animation: somaticBreath 19s infinite ease-in-out; }
        @keyframes somaticBreath { 0%, 100% { opacity: 0.05; transform: scale(1); } 21%, 58% { opacity: 0.3; transform: scale(1.1); } }

        .hot-zone { position: absolute; z-index: 10; display: flex; justify-content: center; align-items: center; color: transparent; text-transform: uppercase; letter-spacing: 4px; font-size: 0.75rem; cursor: pointer; transition: 0.4s; text-decoration: none; }
        .hot-zone:hover { color: var(--accent); background: radial-gradient(circle, rgba(212, 175, 55, 0.1) 0%, transparent 70%); }
        .zone-tl { top: 0; left: 0; width: 25vw; height: 25vh; } .zone-tr { top: 0; right: 0; width: 25vw; height: 25vh; }
        .zone-bl { bottom: 0; left: 0; width: 25vw; height: 25vh; } .zone-br { bottom: 0; right: 0; width: 25vw; height: 25vh; }
        .zone-tc { top: 0; left: 50%; transform: translateX(-50%); width: 30vw; height: 15vh; } .zone-bc { bottom: 0; left: 50%; transform: translateX(-50%); width: 30vw; height: 15vh; }

        .artifact-btn { position: absolute; top: 30px; right: 40px; z-index: 100; background: var(--glass); border: 1px solid var(--accent); color: var(--accent); padding: 10px 20px; cursor: pointer; text-transform: uppercase; font-size: 0.6rem; letter-spacing: 2px; }
    </style>
</head>
<body x-data="guildApp()">
    <div class="neural-anchor"></div><div class="breathing-filigree"></div>
    <button class="artifact-btn" onclick="toggleAlignment()">✨ ALIGNMENT</button>
    <a href="covenant.html" class="hot-zone zone-tl">The Covenant</a>
    <a href="archive.html" class="hot-zone zone-tr">The Archive</a>
    <a href="hearth.html" class="hot-zone zone-bl">The Hearth</a>
    <a href="gallery.html" class="hot-zone zone-br">The Gallery</a>
    <div class="hot-zone zone-tc" @click="showResonance = true">The Resonance</div>
    <script>
        const palettes = ['NOIR', 'LUNAR', 'VELLUM', 'AMETHYST'];
        function toggleAlignment() {
            let next = palettes[(palettes.indexOf(localStorage.getItem('KORE_Palette') || 'NOIR') + 1) % palettes.length];
            document.documentElement.setAttribute('data-palette', next);
            localStorage.setItem('KORE_Palette', next);
        }
        document.addEventListener('DOMContentLoaded', () => { document.documentElement.setAttribute('data-palette', localStorage.getItem('KORE_Palette') || 'NOIR'); });
    </script>
</body>
</html>
